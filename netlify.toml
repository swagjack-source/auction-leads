[functions]
  directory = "netlify/functions"

# Security headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://api.resend.com; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; frame-ancestors 'none'"

# Friendly aliases for calendar feeds
[[redirects]]
  from = "/api/calendar.ics"
  to = "/.netlify/functions/calendar"
  status = 200

[[redirects]]
  from = "/api/consults.ics"
  to = "/.netlify/functions/consults"
  status = 200

[[redirects]]
  from = "/api/send-estimate"
  to = "/.netlify/functions/send-estimate"
  status = 200

# SPA fallback — must come last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
